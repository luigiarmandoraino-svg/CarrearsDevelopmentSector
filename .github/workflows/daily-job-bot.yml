name: Daily Job Bot

on:
  workflow_dispatch:
    inputs:
      max_sources:
        description: "Maximum number of sources to check for manual testing. Use 0 for all sources."
        required: false
        default: "20"
  schedule:
    - cron: "0 4 * * *"

jobs:
  run-job-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dateutil pytz

      - name: Run bot
        run: python -m jobbot.main
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
