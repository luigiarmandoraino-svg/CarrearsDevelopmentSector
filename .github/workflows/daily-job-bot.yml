name: Daily Job Bot

on:
  workflow_dispatch:
  schedule:
    # Every day at 04:00 UTC (06:00 Kigali). Adjust if you like.
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  run-job-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run bot
        run: python -m jobbot.main
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save seen jobs database
        if: always()
        run: |
          if [ -f seen_jobs.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen_jobs.json
            git diff --cached --quiet || git commit -m "Update seen jobs database"
            git push
          else
            echo "seen_jobs.json was not created, nothing to save."
          fi
