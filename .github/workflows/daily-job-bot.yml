name: Daily Job Bot

on:
  workflow_dispatch:
    inputs:
      max_sources:
        description: "Maximum number of sources to check for manual testing. Use 0 for all sources."
        required: false
        default: "20"
      send_all_available:
        description: "Day-zero mode: send all currently visible eligible positions. Use true only for the first full baseline run."
        required: false
        default: "false"
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  run-job-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dateutil pytz

      - name: Run bot
        run: python -m jobbot.main
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_SOURCES: ${{ github.event.inputs.max_sources || '0' }}
          SEND_ALL_AVAILABLE: ${{ github.event.inputs.send_all_available || 'false' }}

      - name: Save seen jobs database
        if: always()
        run: |
          if [ -f seen_jobs.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen_jobs.json
            git diff --cached --quiet || git commit -m "Update seen jobs database"
            git push
          else
            echo "seen_jobs.json was not created, nothing to save."
          fi
