name: Daily Job Bot

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  run-job-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore bot database cache
        uses: actions/cache@v4
        with:
          path: jobbot.sqlite
          key: jobbot-sqlite-${{ github.run_id }}
          restore-keys: |
            jobbot-sqlite-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Enable this only when USE_PLAYWRIGHT=true in repository variables/secrets
          if [ "${USE_PLAYWRIGHT}" = "true" ]; then playwright install chromium; fi
        env:
          USE_PLAYWRIGHT: "true"

      - name: Run daily job bot
        run: python -m jobbot.main --sources sources.csv --db jobbot.sqlite
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Africa/Kigali
          STRICT_POSTED_DATE: "true"
          STRICT_ORG_CATALOG: "true"
          USE_PLAYWRIGHT: "true"
          DRY_RUN: "false"
